log_format velocity_json escape=json
    '{'
        '"time":"$time_iso8601",'
        '"level":"INFO",'
        '"msg":"http request",'
        '"service.name":"velocity-frontend",'
        '"http.method":"$request_method",'
        '"url.path":"$uri",'
        '"http.status_code":$status,'
        '"network.peer.address":"$remote_addr",'
        '"server.address":"$host",'
        '"duration":$request_time'
    '}';

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;
    access_log /dev/stdout velocity_json;
    error_log /dev/stderr warn;

    # Admin SPA — must come before the catch-all
    location /admin {
        try_files $uri $uri/ /admin.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
        # HTML files should not be cached
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Cache hashed assets (Vite generates hashes in filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
