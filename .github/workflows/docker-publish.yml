name: Docker Build and Publish

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: [self-hosted, linux]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  prune:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Prune old versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.event.repository.name }}
          package-type: 'container'
          min-versions-to-keep: 2
          delete-only-untagged-versions: 'true'

    # Necessary to avoid permission issues on the self-hosted runner
      - name: Fix workspace permissions
        if: always()
        run: sudo chown -R $(whoami):$(whoami) .

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, linux]
    env:
      # Runner-local kubeconfig for velocity-frontend (no GitHub secret)
      KUBECONFIG_PATH: /opt/actions-runner/secrets/velocity-frontend.yaml

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate runner kubeconfig
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "$KUBECONFIG_PATH" ]; then
            echo "ERROR: kubeconfig not found at: $KUBECONFIG_PATH"
            exit 1
          fi

          # Ensure kubectl uses the runner-local kubeconfig
          export KUBECONFIG="$KUBECONFIG_PATH"

          # Validate without dumping sensitive content
          kubectl -n web get deploy >/dev/null

      - name: Deploy to Kubernetes
        shell: bash
        env:
          KUBECONFIG: ${{ env.KUBECONFIG_PATH }}
        run: |
          set -euo pipefail

          kubectl apply -f infra/k8s/frontend.yaml

          kubectl -n web set image deployment/velocity-frontend \
            velocity-frontend=${{ env.REGISTRY }}/${{ github.repository }}:${{ github.sha }}

          kubectl -n web rollout status deployment/velocity-frontend --timeout=10m
